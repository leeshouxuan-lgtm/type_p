<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경덕중학교 타자마스터 — 로그인</title>
  <meta name="description" content="학생 타자 연습 관리 플랫폼. Google 로그인으로 시작하세요.">
  <link rel="stylesheet" href="css/main.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div class="page-center">
    <div class="login-wrap">

      <!-- 로고 -->
      <div class="login-logo">
        <img src="/img/logo.png" alt="경덕중학교 로고"
          style="width:100px;height:100px;border-radius:50%;margin-bottom:16px;box-shadow:0 0 28px rgba(0,212,255,0.3)">
        <h1 class="logo-title text-gradient">경덕중학교<br>타자마스터</h1>
        <p class="logo-subtitle">경덕중학교 타자 연습 플랫폼</p>
      </div>

      <!-- 로그인 카드 -->
      <div class="card login-card">
        <h2 class="login-heading">시작하기</h2>
        <p class="login-desc">Google 계정으로 로그인하면<br>바로 연습을 시작할 수 있어요!</p>

        <button id="btn-google-login" class="btn-google">
          <svg viewBox="0 0 48 48" width="22" height="22">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Google로 로그인
        </button>

        <div id="login-error" class="login-error hidden"></div>
      </div>

      <!-- 특징 소개 -->
      <div class="features-grid">
        <div class="feature-item">
          <div class="feature-icon">🎮</div>
          <div class="feature-text">
            <strong>게임처럼 즐기는 연습</strong>
            <span>레벨, EXP, 뱃지로 동기부여</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text">
            <strong>누적 기록 관리</strong>
            <span>WPM, 정확도, 타수 추적</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🏆</div>
          <div class="feature-text">
            <strong>학급·학년 랭킹</strong>
            <span>친구들과 함께 경쟁</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🌏</div>
          <div class="feature-text">
            <strong>한글·영문 동시 연습</strong>
            <span>단어·문장·문단 3가지 모드</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ★ 로그인 페이지 진입 시:
    // 1) 플래그 초기화 (이전 세션 무효화)
    // 2) Firebase 세션 강제 종료
    Auth.clearFreshLogin();
    auth.signOut().then(() => {
      Auth.initAuthListener({
        onLogin: async (user, isAdmin) => {
          // ★ 정상 로그인 완료 → 플래그 세팅
          Auth.markFreshLogin();
          const hasProfile = await Auth.checkProfile(user.uid);
          if (!hasProfile) {
            window.location.href = '/profile.html';
          } else {
            window.location.href = '/app.html';
          }
        }
      });
    });

    document.getElementById('btn-google-login').addEventListener('click', async () => {
      const btn = document.getElementById('btn-google-login');
      btn.disabled = true;
      btn.textContent = '로그인 중...';
      await Auth.signIn();
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 48 48" width="22" height="22">...</svg> Google로 로그인`;
    });
  </script>

  <style>
    .login-wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-logo {
      text-align: center;
    }

    .logo-icon {
      font-size: 4rem;
      margin-bottom: 12px;
    }

    .logo-title {
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .login-card {
      text-align: center;
    }

    .login-heading {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn-google:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
    }

    .btn-google:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: var(--radius-sm);
      color: var(--accent-red);
      font-size: 0.85rem;
      text-align: center;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .feature-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .feature-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-text strong {
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .feature-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</body>

</html>
